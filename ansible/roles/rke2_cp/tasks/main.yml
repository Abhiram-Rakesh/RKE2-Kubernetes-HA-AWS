---
# =============================================================================
# Role: rke2_cp
# Joins additional control plane nodes to an existing RKE2 cluster.
#
# Steps:
#   1. Fetch the join token from the primary control plane (via slurp + delegate_to)
#   2. Install the rke2-server package
#   3. Write config.yaml pointing at the LB supervisor endpoint and the token
#   4. Enable and start rke2-server
#   5. Wait for the supervisor port to confirm the node joined successfully
#
# Plays using this role should use `serial: 1` to join nodes one at a time,
# which ensures etcd quorum is maintained during the join process.
# =============================================================================

- name: Retrieve join token from primary control plane
  slurp:
    src: /var/lib/rancher/rke2/server/node-token
  delegate_to: "{{ groups['control_plane_init'][0] }}"
  become: true
  register: rke2_token_raw

- name: Store token as a host fact
  set_fact:
    rke2_token: "{{ rke2_token_raw.content | b64decode | trim }}"

- name: Install RKE2 server
  shell: |
    curl -sfL https://get.rke2.io | INSTALL_RKE2_VERSION={{ rke2_version }} sh -
  args:
    creates: /usr/local/bin/rke2

- name: Create RKE2 configuration directory
  file:
    path: /etc/rancher/rke2
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy RKE2 join configuration
  template:
    src: rke2-join-config.yaml.j2
    dest: /etc/rancher/rke2/config.yaml
    owner: root
    group: root
    mode: "0640"

- name: Enable and start rke2-server
  service:
    name: rke2-server
    state: started
    enabled: true

- name: Wait for RKE2 supervisor port — confirms node joined successfully
  wait_for:
    host: 127.0.0.1
    port: 9345
    delay: "{{ rke2_startup_delay }}"
    timeout: "{{ rke2_startup_timeout }}"
